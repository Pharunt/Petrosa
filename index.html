<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pokémon Petrosa</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0f1117;--surface:#1a1d27;--surface2:#22263a;
    --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.15);
    --text:#e8eaf0;--text2:#8b90a8;--text3:#555a72;
    --red:#e85d5d;--red-bg:rgba(232,93,93,0.12);
    --green:#4caf7d;--green-bg:rgba(76,175,125,0.12);
    --amber:#f0a500;--amber-bg:rgba(240,165,0,0.12);
    --radius:12px;--radius-sm:8px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

  .sync-bar{background:var(--surface2);border-bottom:1px solid var(--border);padding:6px 24px;display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text2)}
  .sync-dot{width:7px;height:7px;border-radius:50%;background:var(--text3);flex-shrink:0;transition:background .3s}
  .sync-dot.ok{background:var(--green)}
  .sync-dot.loading{background:var(--amber);animation:pulse 1s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

  header{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 24px;position:sticky;top:0;z-index:100}
  .logo{font-size:22px;font-weight:800;letter-spacing:-0.5px}
  .logo span{color:var(--amber)}
  .header-sub{font-size:12px;color:var(--text2);font-weight:600;letter-spacing:0.5px;text-transform:uppercase;margin-top:2px}

  .tabs-bar{display:flex;gap:2px;padding:0 24px;background:var(--surface);border-bottom:1px solid var(--border);overflow-x:auto}
  .tab{padding:12px 18px;font-size:13px;font-weight:700;cursor:pointer;border:none;background:none;color:var(--text2);border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap;transition:color .15s;font-family:'Nunito',sans-serif}
  .tab:hover{color:var(--text)}
  .tab.active{color:var(--amber);border-bottom-color:var(--amber)}

  .content{padding:24px;max-width:980px;margin:0 auto}
  .section{display:none}
  .section.active{display:block}

  /* DRESSEURS */
  .player-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:16px}
  .player-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px}
  .player-header{display:flex;align-items:center;gap:12px;margin-bottom:16px}
  .player-avatar{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;flex-shrink:0}
  .player-name-input{font-size:16px;font-weight:700;border:none;background:none;color:var(--text);width:100%;outline:none;font-family:'Nunito',sans-serif}
  .player-name-input:focus{background:var(--surface2);border-radius:6px;padding:2px 8px}
  .badges-label{font-size:10px;color:var(--text2);margin-bottom:8px;text-transform:uppercase;letter-spacing:0.8px;font-weight:700}
  .badges-row{display:flex;flex-wrap:wrap;gap:5px}
  .badge-btn{width:32px;height:32px;border-radius:50%;border:1.5px solid var(--border2);background:var(--surface2);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .15s;line-height:1}
  .badge-btn.earned{background:var(--amber-bg);border-color:var(--amber);box-shadow:0 0 8px rgba(240,165,0,0.3)}
  .badge-btn:hover{transform:scale(1.15);border-color:var(--amber)}

  /* CAPTURES */
  .player-tabs{display:flex;gap:4px;margin-bottom:20px;flex-wrap:wrap}
  .player-tab{padding:8px 16px;font-size:13px;font-weight:700;cursor:pointer;border:1px solid var(--border2);border-radius:var(--radius-sm);background:var(--surface2);color:var(--text2);font-family:'Nunito',sans-serif;transition:all .15s;display:flex;align-items:center;gap:8px}
  .player-tab:hover{color:var(--text)}
  .player-tab.active{background:var(--surface);color:var(--text)}
  .player-tab-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
  .capture-panel{display:none}
  .capture-panel.active{display:block}
  .capture-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
  .capture-header-left{display:flex;align-items:center;gap:10px}
  .capture-avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800}
  .capture-pname{font-size:16px;font-weight:800}
  .capture-stats{font-size:12px;color:var(--text2);font-weight:600}
  .add-btn{font-size:13px;padding:8px 16px;border:1px solid var(--border2);border-radius:var(--radius-sm);background:var(--surface);cursor:pointer;color:var(--text);font-weight:700;font-family:'Nunito',sans-serif;transition:all .15s}
  .add-btn:hover{background:var(--surface2);border-color:var(--amber);color:var(--amber)}

  .poke-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:10px}
  .poke-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;position:relative;transition:border-color .15s}
  .poke-card:hover{border-color:var(--border2)}
  .poke-card.starter{border-color:rgba(240,165,0,0.4);background:rgba(240,165,0,0.05)}
  .starter-badge{font-size:10px;font-weight:800;color:var(--amber);text-transform:uppercase;letter-spacing:0.6px;margin-bottom:6px;display:flex;align-items:center;gap:4px}
  .poke-zone-badge{margin-bottom:6px}
  .poke-zone-sel{font-size:11px;border:none;background:var(--surface2);color:var(--text2);border-radius:20px;padding:2px 8px;outline:none;cursor:pointer;font-family:'Nunito',sans-serif;font-weight:600;max-width:160px}
  .poke-zone-sel option{background:#1a1d27}
  .poke-name-input{font-size:15px;font-weight:800;border:none;background:none;color:var(--text);width:100%;outline:none;font-family:'Nunito',sans-serif;margin-bottom:2px}
  .poke-name-input:focus{background:var(--surface2);border-radius:4px;padding:0 4px}
  .poke-nick-input{font-size:12px;border:none;background:none;color:var(--text2);width:100%;outline:none;font-family:'Nunito',sans-serif}
  .poke-nick-input:focus{background:var(--surface2);border-radius:4px;padding:0 4px}
  .poke-del{position:absolute;top:10px;right:10px;border:none;background:none;color:var(--text3);cursor:pointer;font-size:16px;opacity:0;transition:opacity .15s}
  .poke-card:hover .poke-del{opacity:1}
  .poke-del:hover{color:var(--red)}
  .empty-state{text-align:center;padding:3rem;color:var(--text2);font-size:14px;line-height:2}

  /* ZONES */
  .zones-intro{font-size:13px;color:var(--text2);margin-bottom:16px;font-weight:600}
  .zone-filter{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
  .zone-filter-btn{padding:5px 12px;font-size:12px;font-weight:700;border:1px solid var(--border2);border-radius:20px;background:none;color:var(--text2);cursor:pointer;font-family:'Nunito',sans-serif;transition:all .15s}
  .zone-filter-btn.active{background:var(--surface);color:var(--text);border-color:var(--amber)}
  .zones-grid{display:flex;flex-direction:column;gap:6px}
  .zone-row{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 14px;display:grid;grid-template-columns:160px 1fr;align-items:center;gap:10px}
  .zone-row.starter-row{border-color:rgba(240,165,0,0.3);background:rgba(240,165,0,0.04)}
  .zone-name{font-size:13px;font-weight:700;display:flex;align-items:center;gap:6px}
  .zone-star{font-size:12px}
  .zone-captures{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
  .zone-cap-pill{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:700;display:flex;align-items:center;gap:5px}
  .zone-empty{font-size:11px;color:var(--text3);font-weight:600;font-style:italic}

  /* ARENES */
  .arena-list{display:flex;flex-direction:column;gap:8px}
  .arena-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
  .arena-card:hover{border-color:var(--border2)}
  .arena-title-row{display:flex;align-items:center;gap:12px;padding:14px 18px;cursor:pointer;user-select:none;transition:background .15s}
  .arena-title-row:hover{background:var(--surface2)}
  .arena-emoji{font-size:22px;line-height:1;flex-shrink:0}
  .arena-info{flex:1}
  .arena-name{font-size:14px;font-weight:800}
  .arena-champ{font-size:11px;color:var(--text2);font-weight:600;margin-top:1px}
  .mini-pill{font-size:11px;padding:2px 8px;border-radius:20px;font-weight:700}
  .pill-gray{background:var(--surface2);color:var(--text2)}
  .arena-chevron{color:var(--text2);font-size:11px;transition:transform .2s;flex-shrink:0}
  .arena-chevron.open{transform:rotate(180deg)}
  .arena-body{border-top:1px solid var(--border);padding:16px 18px;display:none}
  .arena-body.open{display:block}
  .fight-section-title{font-size:10px;font-weight:800;color:var(--text2);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:10px;margin-top:16px}
  .fight-section-title:first-child{margin-top:0}
  .fight-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;flex-wrap:wrap}
  .fight-label{flex:1;font-size:13px;font-weight:600;display:flex;align-items:center;gap:6px;min-width:120px}
  .fight-btns{display:flex;gap:4px}
  .fb{padding:4px 10px;border-radius:6px;border:1px solid var(--border2);background:var(--surface2);cursor:pointer;font-size:12px;font-weight:700;font-family:'Nunito',sans-serif;color:var(--text2);transition:all .1s}
  .fb:hover{border-color:var(--text2);color:var(--text)}
  .fb.win{background:var(--green-bg);border-color:var(--green);color:var(--green)}
  .fb.loss{background:var(--red-bg);border-color:var(--red);color:var(--red)}
  .fb.null{background:var(--surface2);color:var(--text3);border-color:var(--border)}
  .fight-result-txt{font-size:11px;min-width:70px;color:var(--text2);font-weight:600}

  /* RECAP */
  .recap-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px;margin-bottom:24px}
  .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px}
  .stat-card-header{display:flex;align-items:center;gap:8px;margin-bottom:12px}
  .stat-dot{width:10px;height:10px;border-radius:50%}
  .stat-pname{font-size:14px;font-weight:800}
  .stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .stat-label{font-size:10px;color:var(--text2);font-weight:700;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:2px}
  .stat-value{font-size:22px;font-weight:800}
  .stat-sub{font-size:11px;color:var(--text2);font-weight:600}
  .progress-bar{height:4px;border-radius:2px;background:var(--surface2);margin-top:12px;overflow:hidden}
  .progress-fill{height:100%;border-radius:2px;transition:width .4s}
  .section-title{font-size:11px;font-weight:800;color:var(--text2);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:10px;margin-top:24px}
  .recap-table{width:100%;border-collapse:collapse;font-size:12px}
  .recap-table th{font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:0.5px;padding:8px 10px;border-bottom:1px solid var(--border);text-align:center}
  .recap-table th:first-child{text-align:left}
  .recap-table td{padding:8px 10px;border-bottom:1px solid var(--border);text-align:center;font-size:12px;font-weight:600}
  .recap-table td:first-child{text-align:left}
  .recap-table tr:last-child td{border-bottom:none}
  .recap-table tr:hover td{background:rgba(255,255,255,0.02)}
  .hint{font-size:10px;color:var(--text3);margin-top:6px;font-weight:600}
  .player-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:4px}
</style>
</head>
<body>

<div class="sync-bar">
  <div class="sync-dot loading" id="sync-dot"></div>
  <span id="sync-txt">Connexion...</span>
</div>
<header>
  <div class="logo">Pokémon <span>Petrosa</span></div>
  <div class="header-sub">Tracker — Aventure entre amis</div>
</header>
<div class="tabs-bar">
  <button class="tab active" onclick="showTab('dresseurs')">Dresseurs</button>
  <button class="tab" onclick="showTab('captures')">Captures</button>
  <button class="tab" onclick="showTab('zones')">Zones</button>
  <button class="tab" onclick="showTab('arenes')">Arènes</button>
  <button class="tab" onclick="showTab('recap')">Récap</button>
</div>
<div class="content">
  <div id="tab-dresseurs" class="section active"></div>
  <div id="tab-captures" class="section"></div>
  <div id="tab-zones" class="section"></div>
  <div id="tab-arenes" class="section"></div>
  <div id="tab-recap" class="section"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyC5ULOYJ8xkcrBSgMhSpfO5EScL0yFSCXk",
  authDomain: "petrosa-34e2d.firebaseapp.com",
  projectId: "petrosa-34e2d",
  storageBucket: "petrosa-34e2d.firebasestorage.app",
  messagingSenderId: "804025411873",
  appId: "1:804025411873:web:76829d12f98e1d785a3660"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const docRef = doc(db, "tracker", "shared");

const PC = [
  {bg:'rgba(91,142,240,0.2)',color:'#5b8ef0',dot:'#5b8ef0'},
  {bg:'rgba(240,165,0,0.2)', color:'#f0a500',dot:'#f0a500'},
  {bg:'rgba(76,175,125,0.2)',color:'#4caf7d',dot:'#4caf7d'},
];

const ARENES = [
  {name:'Mérouville',    champ:'Roxanne',     type:'Roche',    emoji:'🪨',badge:'Badge Roche'},
  {name:'Myokara',       champ:'Bastien',     type:'Combat',   emoji:'🥊',badge:'Badge Poing'},
  {name:'Lavandia',      champ:'Voltère',     type:'Électrik', emoji:'⚡',badge:'Badge Dynamo'},
  {name:'Vermilava',     champ:'Adriane',     type:'Feu',      emoji:'🔥',badge:'Badge Chaleur'},
  {name:'Clémenti-Ville',champ:'Norman',      type:'Normal',   emoji:'⭕',badge:'Badge Balancier'},
  {name:'Cimetronelle',  champ:'Alizée',      type:'Vol',      emoji:'🌬️',badge:'Badge Plume'},
  {name:'Algatia',       champ:'Lévy & Tatia',type:'Psy',      emoji:'🔮',badge:'Badge Esprit'},
  {name:'Atalanopolis',  champ:'Marc',        type:'Eau',      emoji:'💧',badge:'Badge Pluie'},
];

// Starter en premier, puis toutes les zones
const ZONES = [
  '⭐ Starter',
  'Route 101','Route 102','Route 103','Route 104','Route 110','Route 111','Route 112',
  'Route 113','Route 114','Route 115','Route 116','Route 117','Route 118','Route 119',
  'Route 120','Route 121','Route 123',
  'Chenal 105','Chenal 106','Chenal 107','Chenal 108','Chenal 109',
  'Chenal 122','Chenal 124','Chenal 125','Chenal 126','Chenal 127',
  'Chenal 128','Chenal 129','Chenal 130','Chenal 131','Chenal 132','Chenal 133','Chenal 134',
  'Bois Clémenti','Grotte Granite','Lavandia Sea','Chemin Ardent','Sentier Sinuroc',
  'Site Météore','Tunnel Mérazon','Désert Central','Grotte Tréfonds','Parc Safari',
  'Mont Mémoria','Grotte Origine','Route Victoire','Atoll de Combat',
  'Caverne Fondmer','Grotte Zénith','Mont Chimnée',
];

const makeArena = () => ({vsChamp:[null,null,null],duels:{'0v1':{winner:null},'0v2':{winner:null},'1v2':{winner:null}}});

let state = {
  players:[
    {name:'Joueur 1',badges:Array(8).fill(false)},
    {name:'Joueur 2',badges:Array(8).fill(false)},
    {name:'Joueur 3',badges:Array(8).fill(false)},
  ],
  captures:[[],[],[]],
  arenes:Array(8).fill(null).map(()=>makeArena()),
};

let currentPlayerTab = 0;
let openArena = -1;
let zoneFilter = 'all';
let saveTimeout = null;

const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

function setSyncStatus(s){
  const dot=document.getElementById('sync-dot'),txt=document.getElementById('sync-txt');
  if(s==='ok'){dot.className='sync-dot ok';txt.textContent='Synchronisé ✓';}
  else if(s==='loading'){dot.className='sync-dot loading';txt.textContent='Synchronisation...';}
  else{dot.className='sync-dot';txt.textContent='Hors ligne';}
}

async function saveToFirebase(){
  setSyncStatus('loading');
  try{
    await setDoc(docRef, JSON.parse(JSON.stringify(state)));
    setSyncStatus('ok');
  }catch(e){setSyncStatus('error');}
}
function scheduleSave(){
  if(saveTimeout)clearTimeout(saveTimeout);
  saveTimeout=setTimeout(saveToFirebase,700);
}

onSnapshot(docRef,(snap)=>{
  setSyncStatus('ok');
  if(snap.exists()){
    const d=snap.data();
    state.players=d.players||state.players;
    if(Array.isArray(d.captures)&&Array.isArray(d.captures[0])){
      state.captures=d.captures;
    }
    state.arenes=d.arenes||state.arenes;
    renderAll();
  }
},()=>setSyncStatus('error'));

// ===== DRESSEURS =====
function renderDresseurs(){
  document.getElementById('tab-dresseurs').innerHTML=`<div class="player-grid">${state.players.map((p,i)=>{
    const c=PC[i],init=p.name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2),earned=p.badges.filter(Boolean).length;
    return `<div class="player-card"><div class="player-header">
      <div class="player-avatar" style="background:${c.bg};color:${c.color}">${init}</div>
      <input class="player-name-input" value="${esc(p.name)}" onchange="updateName(${i},this.value)"/>
    </div>
    <div class="badges-label">Badges (${earned}/8)</div>
    <div class="badges-row">${ARENES.map((a,j)=>`<button class="badge-btn${p.badges[j]?' earned':''}" onclick="toggleBadge(${i},${j})" title="${a.badge}">${a.emoji}</button>`).join('')}</div>
    </div>`;
  }).join('')}</div>`;
}
window.updateName=(i,v)=>{state.players[i].name=v||`Joueur ${i+1}`;scheduleSave();renderAll();};
window.toggleBadge=(pi,bi)=>{state.players[pi].badges[bi]=!state.players[pi].badges[bi];scheduleSave();renderAll();};

// ===== CAPTURES =====
function renderCaptures(){
  const tabs=state.players.map((p,i)=>{
    const c=PC[i],caps=state.captures[i]||[];
    return `<button class="player-tab${currentPlayerTab===i?' active':''}" onclick="switchPlayerTab(${i})">
      <span class="player-tab-dot" style="background:${c.dot}"></span>
      ${esc(p.name)} <span style="font-size:11px;opacity:0.6">(${caps.length})</span>
    </button>`;
  }).join('');

  const panels=state.players.map((p,i)=>{
    const c=PC[i],caps=state.captures[i]||[];
    const starter=caps.find(x=>x.zone==='⭐ Starter');
    const others=caps.filter(x=>x.zone!=='⭐ Starter');

    const makeCard=(cap,ci,isStarter)=>{
      const zOpts=ZONES.map(z=>`<option value="${z}"${z===cap.zone?' selected':''}>${z}</option>`).join('');
      return `<div class="poke-card${isStarter?' starter':''}">
        <button class="poke-del" onclick="delCap(${i},${ci})">×</button>
        ${isStarter?`<div class="starter-badge">⭐ Starter</div>`:`<div class="poke-zone-badge"><select class="poke-zone-sel" onchange="updCap(${i},${ci},'zone',this.value)">${zOpts}</select></div>`}
        <input class="poke-name-input" value="${esc(cap.pokemon)}" placeholder="Nom du Pokémon" onchange="updCap(${i},${ci},'pokemon',this.value)"/>
        <input class="poke-nick-input" value="${esc(cap.surnom)}" placeholder="Surnom..." onchange="updCap(${i},${ci},'surnom',this.value)"/>
      </div>`;
    };

    // Index réels dans state.captures[i]
    const starterIdx=caps.indexOf(starter);
    const starterCard=starter?makeCard(starter,starterIdx,true):'';
    const otherCards=others.map(cap=>{
      const ci=caps.indexOf(cap);
      return makeCard(cap,ci,false);
    }).join('');

    const cards=caps.length===0
      ?`<div class="empty-state">Aucune capture pour ${esc(p.name)}.<br>Cliquez sur <strong>+ Ajouter</strong> ou <strong>+ Starter</strong> !</div>`
      :`${starterCard}${otherCards}`;

    return `<div class="capture-panel${currentPlayerTab===i?' active':''}" id="panel-${i}">
      <div class="capture-header">
        <div class="capture-header-left">
          <div class="capture-avatar" style="background:${c.bg};color:${c.color}">${p.name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2)}</div>
          <div>
            <div class="capture-pname">${esc(p.name)}</div>
            <div class="capture-stats">${caps.length} Pokémon${starter?' · Starter : '+esc(starter.pokemon||'?'):''}</div>
          </div>
        </div>
        <div style="display:flex;gap:8px">
          ${!starter?`<button class="add-btn" style="border-color:var(--amber);color:var(--amber)" onclick="addStarter(${i})">⭐ Starter</button>`:''}
          <button class="add-btn" onclick="addCap(${i})">+ Ajouter</button>
        </div>
      </div>
      <div class="poke-grid">${cards}</div>
    </div>`;
  }).join('');

  document.getElementById('tab-captures').innerHTML=`<div class="player-tabs">${tabs}</div>${panels}`;
}

window.switchPlayerTab=(i)=>{currentPlayerTab=i;renderCaptures();};
window.addStarter=(pi)=>{
  if(!state.captures[pi])state.captures[pi]=[];
  state.captures[pi].unshift({pokemon:'',surnom:'',zone:'⭐ Starter'});
  scheduleSave();renderCaptures();renderZones();renderRecap();
};
window.addCap=(pi)=>{
  if(!state.captures[pi])state.captures[pi]=[];
  state.captures[pi].push({pokemon:'',surnom:'',zone:ZONES[1]});
  scheduleSave();renderCaptures();renderZones();renderRecap();
};
window.updCap=(pi,ci,k,v)=>{state.captures[pi][ci][k]=v;scheduleSave();renderCaptures();renderZones();renderRecap();};
window.delCap=(pi,ci)=>{state.captures[pi].splice(ci,1);scheduleSave();renderCaptures();renderZones();renderRecap();};

// ===== ZONES =====
function renderZones(){
  const filterBtns=[
    {key:'all',label:'Toutes'},
    {key:'done',label:'Capturées'},
    {key:'free',label:'Libres'},
  ].map(f=>`<button class="zone-filter-btn${zoneFilter===f.key?' active':''}" onclick="setZoneFilter('${f.key}')">${f.label}</button>`).join('');

  const rows=ZONES.map(zone=>{
    const isStarter=zone==='⭐ Starter';
    const caps=state.players.map((p,pi)=>{
      const found=(state.captures[pi]||[]).find(c=>c.zone===zone&&c.pokemon);
      return found?{pi,found}:null;
    }).filter(Boolean);

    const hasCap=caps.length>0;
    if(zoneFilter==='done'&&!hasCap)return '';
    if(zoneFilter==='free'&&hasCap)return '';

    const pills=caps.map(({pi,found})=>{
      const c=PC[pi];
      return `<span class="zone-cap-pill" style="background:${c.bg};color:${c.color}">
        <span style="width:6px;height:6px;border-radius:50%;background:${c.dot};display:inline-block;flex-shrink:0"></span>
        ${esc(state.players[pi].name)} — ${esc(found.pokemon)}${found.surnom?` "${esc(found.surnom)}"`:''}</span>`;
    }).join('');

    const borderColor=hasCap?(isStarter?'rgba(240,165,0,0.4)':'rgba(76,175,125,0.3)'):'var(--border)';
    const rowClass=`zone-row${isStarter?' starter-row':''}`;

    return `<div class="${rowClass}" style="border-color:${borderColor}">
      <div class="zone-name">${isStarter?'<span class="zone-star">⭐</span>Starter':zone}</div>
      <div class="zone-captures">${hasCap?pills:`<span class="zone-empty">Pas encore capturé</span>`}</div>
    </div>`;
  }).filter(Boolean).join('');

  const totalZones=ZONES.length;
  const doneZones=ZONES.filter(z=>state.players.some((_,pi)=>(state.captures[pi]||[]).some(c=>c.zone===z&&c.pokemon))).length;

  document.getElementById('tab-zones').innerHTML=`
    <div class="zones-intro">${doneZones} / ${totalZones} zones avec une capture</div>
    <div class="zone-filter">${filterBtns}</div>
    <div class="zones-grid">${rows||'<div class="empty-state">Aucune zone à afficher.</div>'}</div>`;
}
window.setZoneFilter=(f)=>{zoneFilter=f;renderZones();};

// ===== ARENES =====
const computeWins=(ai)=>{
  const ar=state.arenes[ai],wins=[0,0,0];
  ar.vsChamp.forEach((r,pi)=>{if(r==='win')wins[pi]++;});
  [[0,1],[0,2],[1,2]].forEach(([a,b])=>{const w=ar.duels[`${a}v${b}`].winner;if(w===a)wins[a]++;else if(w===b)wins[b]++;});
  return wins;
};
function arenaPill(ai){
  const ar=state.arenes[ai];
  const any=ar.vsChamp.some(r=>r!==null)||Object.values(ar.duels).some(d=>d.winner!==null);
  if(!any)return `<span class="mini-pill pill-gray">Non joué</span>`;
  const wins=computeWins(ai),max=Math.max(...wins);
  if(max===0)return `<span class="mini-pill pill-gray">En cours</span>`;
  const l=wins.indexOf(max);
  return `<span class="mini-pill" style="background:${PC[l].bg};color:${PC[l].color}">${esc(state.players[l].name)} — ${max} pts</span>`;
}
function renderArenes(){
  const html=ARENES.map((a,ai)=>{
    const ar=state.arenes[ai],isOpen=openArena===ai;
    const vsRows=state.players.map((p,pi)=>{
      const r=ar.vsChamp[pi];
      const txt=r==='win'?`<span style="color:#4caf7d">Victoire</span>`:r==='loss'?`<span style="color:#e85d5d">Défaite</span>`:'—';
      return `<div class="fight-row">
        <div class="fight-label"><span class="player-dot" style="background:${PC[pi].dot}"></span>${esc(p.name)}</div>
        <div class="fight-btns">
          <button class="fb${r==='win'?' win':''}" onclick="setChamp(${ai},${pi},'win')">✓ Victoire</button>
          <button class="fb${r==='loss'?' loss':''}" onclick="setChamp(${ai},${pi},'loss')">✗ Défaite</button>
          <button class="fb${r===null?' null':''}" onclick="setChamp(${ai},${pi},null)">— Réinit</button>
        </div>
        <div class="fight-result-txt">${txt}</div>
      </div>`;
    }).join('');
    const duelRows=[[0,1],[0,2],[1,2]].map(([pa,pb])=>{
      const key=`${pa}v${pb}`,w=ar.duels[key].winner;
      const na=esc(state.players[pa].name),nb=esc(state.players[pb].name);
      const txt=w===pa?`<span style="color:#4caf7d">${na}</span>`:w===pb?`<span style="color:#4caf7d">${nb}</span>`:'—';
      return `<div class="fight-row">
        <div class="fight-label"><span class="player-dot" style="background:${PC[pa].dot}"></span>${na}<span style="color:#555a72;margin:0 4px">vs</span><span class="player-dot" style="background:${PC[pb].dot}"></span>${nb}</div>
        <div class="fight-btns">
          <button class="fb${w===pa?' win':''}" onclick="setDuel(${ai},'${key}',${pa})">${na}</button>
          <button class="fb${w===pb?' win':''}" onclick="setDuel(${ai},'${key}',${pb})">${nb}</button>
          <button class="fb${w===null?' null':''}" onclick="setDuel(${ai},'${key}',null)">— Réinit</button>
        </div>
        <div class="fight-result-txt">${txt} gagne</div>
      </div>`;
    }).join('');
    return `<div class="arena-card">
      <div class="arena-title-row" onclick="toggleArena(${ai})">
        <span class="arena-emoji">${a.emoji}</span>
        <div class="arena-info"><div class="arena-name">${a.name} — ${a.champ}</div><div class="arena-champ">Type ${a.type} · ${a.badge}</div></div>
        <div>${arenaPill(ai)}</div>
        <span class="arena-chevron${isOpen?' open':''}">▼</span>
      </div>
      <div class="arena-body${isOpen?' open':''}">
        <div class="fight-section-title">Vs le champion ${a.champ}</div>${vsRows}
        <div class="fight-section-title">Affrontements entre dresseurs</div>${duelRows}
      </div>
    </div>`;
  }).join('');
  document.getElementById('tab-arenes').innerHTML=`<div class="arena-list">${html}</div>`;
}
window.toggleArena=(ai)=>{openArena=openArena===ai?-1:ai;renderArenes();};
window.setChamp=(ai,pi,val)=>{
  state.arenes[ai].vsChamp[pi]=val;
  if(val==='win')state.players[pi].badges[ai]=true;
  else if(val==='loss')state.players[pi].badges[ai]=false;
  scheduleSave();renderAll();
};
window.setDuel=(ai,key,winner)=>{state.arenes[ai].duels[key].winner=winner;scheduleSave();renderArenes();renderRecap();};

// ===== RECAP =====
function renderRecap(){
  const cW=[0,0,0],dW=[0,0,0];
  state.arenes.forEach(ar=>{
    ar.vsChamp.forEach((r,pi)=>{if(r==='win')cW[pi]++;});
    [[0,1],[0,2],[1,2]].forEach(([a,b])=>{const w=ar.duels[`${a}v${b}`].winner;if(w===a)dW[a]++;else if(w===b)dW[b]++;});
  });
  const cards=state.players.map((p,i)=>{
    const c=PC[i],caps=state.captures[i]||[];
    const badges=p.badges.filter(Boolean).length;
    const zones=new Set(caps.filter(x=>x.pokemon).map(x=>x.zone)).size;
    const starter=caps.find(x=>x.zone==='⭐ Starter');
    return `<div class="stat-card"><div class="stat-card-header"><div class="stat-dot" style="background:${c.dot}"></div><div class="stat-pname">${esc(p.name)}</div></div>
    <div class="stat-grid">
      <div><div class="stat-label">Pokémon</div><div class="stat-value">${caps.length}</div><div class="stat-sub">${starter?esc(starter.pokemon||'?'):'Pas de starter'}</div></div>
      <div><div class="stat-label">Badges</div><div class="stat-value">${badges}/8</div></div>
      <div><div class="stat-label">Zones</div><div class="stat-value">${zones}</div></div>
      <div><div class="stat-label">Pts arènes</div><div class="stat-value">${cW[i]+dW[i]}</div><div class="stat-sub">${cW[i]} champ · ${dW[i]} duels</div></div>
    </div>
    <div class="progress-bar"><div class="progress-fill" style="width:${Math.round(badges/8*100)}%;background:${c.dot}"></div></div>
    </div>`;
  }).join('');
  const pN=state.players.map(p=>esc(p.name));
  const aRows=ARENES.map((a,ai)=>{
    const ar=state.arenes[ai];
    const cells=state.players.map((_,pi)=>{
      const ch=ar.vsChamp[pi];
      const dr=[[0,1],[0,2],[1,2]].filter(([pa,pb])=>pa===pi||pb===pi).map(([pa,pb])=>{
        const w=ar.duels[`${pa}v${pb}`].winner;
        return w===pi?`<span style="color:#4caf7d">+1</span>`:w!==null?`<span style="color:#555a72">0</span>`:`<span style="color:#555a72">—</span>`;
      }).join(' ');
      const ct=ch==='win'?'<span style="color:#4caf7d">✓</span>':ch==='loss'?'<span style="color:#e85d5d">✗</span>':'<span style="color:#555a72">—</span>';
      return `<td>${ct} ${dr}</td>`;
    }).join('');
    return `<tr><td>${a.emoji} ${a.name}</td>${cells}</tr>`;
  }).join('');
  const dRows=[[0,1],[0,2],[1,2]].map(([a,b])=>{
    let wa=0,wb=0;
    state.arenes.forEach(ar=>{const w=ar.duels[`${a}v${b}`].winner;if(w===a)wa++;else if(w===b)wb++;});
    const l=wa>wb?`<span style="color:#4caf7d">${pN[a]}</span>`:wb>wa?`<span style="color:#4caf7d">${pN[b]}</span>`:'Égalité';
    return `<tr><td><span class="player-dot" style="background:${PC[a].dot}"></span>${pN[a]} vs <span class="player-dot" style="background:${PC[b].dot}"></span>${pN[b]}</td><td style="font-weight:800">${wa} — ${wb}</td><td>${l}</td></tr>`;
  }).join('');
  document.getElementById('tab-recap').innerHTML=`
    <div class="recap-grid">${cards}</div>
    <div class="section-title">Résultats par arène</div>
    <div style="overflow-x:auto"><table class="recap-table"><thead><tr><th>Arène</th>${pN.map(n=>`<th>${n}</th>`).join('')}</tr></thead><tbody>${aRows}</tbody></table></div>
    <p class="hint">✓ = victoire champion · ✗ = défaite · +1 = duel gagné · 0 = duel perdu</p>
    <div class="section-title" style="margin-top:28px">Classement duels entre dresseurs</div>
    <div style="overflow-x:auto"><table class="recap-table"><thead><tr><th>Matchup</th><th>Score</th><th>En tête</th></tr></thead><tbody>${dRows}</tbody></table></div>`;
}

// ===== NAV =====
const TAB_NAMES=['dresseurs','captures','zones','arenes','recap'];
window.showTab=(name)=>{
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',TAB_NAMES[i]===name));
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
};

function renderAll(){renderDresseurs();renderCaptures();renderZones();renderArenes();renderRecap();}
renderAll();
</script>
</body>
</html>
