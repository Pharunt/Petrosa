<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pokémon ROSA — Nuzlocke Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.15);
    --text: #e8eaf0;
    --text2: #8b90a8;
    --text3: #555a72;
    --red: #e85d5d; --red-bg: rgba(232,93,93,0.12);
    --green: #4caf7d; --green-bg: rgba(76,175,125,0.12);
    --amber: #f0a500; --amber-bg: rgba(240,165,0,0.12);
    --blue: #5b8ef0; --blue-bg: rgba(91,142,240,0.12);
    --p0: #5b8ef0; --p0bg: rgba(91,142,240,0.15);
    --p1: #f0a500; --p1bg: rgba(240,165,0,0.15);
    --p2: #4caf7d; --p2bg: rgba(76,175,125,0.15);
    --radius: 12px;
    --radius-sm: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Nunito', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    gap: 12px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; }
  .logo span { color: var(--amber); }
  .header-sub { font-size: 12px; color: var(--text2); font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; }

  .tabs-bar {
    display: flex;
    gap: 2px;
    padding: 0 24px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
  }
  .tab {
    padding: 12px 18px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    border: none;
    background: none;
    color: var(--text2);
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    white-space: nowrap;
    transition: color .15s;
    font-family: 'Nunito', sans-serif;
    letter-spacing: 0.3px;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--amber); border-bottom-color: var(--amber); }

  .content { padding: 24px; max-width: 960px; margin: 0 auto; }
  .section { display: none; }
  .section.active { display: block; }

  /* ---- JOUEURS ---- */
  .player-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 16px; }
  .player-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
  }
  .player-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
  .player-avatar {
    width: 44px; height: 44px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 800; flex-shrink: 0;
  }
  .player-name-input {
    font-size: 16px; font-weight: 700; border: none; background: none;
    color: var(--text); width: 100%; outline: none; font-family: 'Nunito', sans-serif;
  }
  .player-name-input:focus {
    background: var(--surface2); border-radius: 6px; padding: 2px 8px;
  }
  .badges-label { font-size: 10px; color: var(--text2); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.8px; font-weight: 700; }
  .badges-row { display: flex; flex-wrap: wrap; gap: 5px; }
  .badge-btn {
    width: 32px; height: 32px; border-radius: 50%;
    border: 1.5px solid var(--border2);
    background: var(--surface2); cursor: pointer;
    font-size: 16px; display: flex; align-items: center; justify-content: center;
    transition: all .15s; line-height: 1;
  }
  .badge-btn.earned { background: var(--amber-bg); border-color: var(--amber); box-shadow: 0 0 8px rgba(240,165,0,0.3); }
  .badge-btn:hover { transform: scale(1.15); border-color: var(--amber); }

  /* ---- CAPTURES ---- */
  .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .section-header h3 { font-size: 18px; font-weight: 800; }
  .add-btn {
    font-size: 13px; padding: 8px 16px; border: 1px solid var(--border2);
    border-radius: var(--radius-sm); background: var(--surface); cursor: pointer;
    color: var(--text); font-weight: 700; font-family: 'Nunito', sans-serif; transition: all .15s;
  }
  .add-btn:hover { background: var(--surface2); border-color: var(--amber); color: var(--amber); }

  .table-wrap { overflow-x: auto; }
  .captures-table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 600px; }
  .captures-table th {
    text-align: left; font-size: 10px; font-weight: 700; color: var(--text2);
    text-transform: uppercase; letter-spacing: 0.6px;
    padding: 8px 10px; border-bottom: 1px solid var(--border);
  }
  .captures-table td { padding: 8px 10px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  .captures-table tr:last-child td { border-bottom: none; }
  .captures-table tr:hover td { background: rgba(255,255,255,0.02); }
  .player-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 5px; flex-shrink: 0; }
  .inline-input {
    border: none; background: none; font-size: 13px; color: var(--text);
    width: 100%; outline: none; font-family: 'Nunito', sans-serif; font-weight: 600;
  }
  .inline-input:focus { background: var(--surface2); border-radius: 4px; padding: 2px 6px; }
  .inline-select {
    border: none; background: none; font-size: 13px; color: var(--text2);
    outline: none; cursor: pointer; font-family: 'Nunito', sans-serif; font-weight: 600;
    max-width: 140px;
  }
  .inline-select option { background: #1a1d27; }
  .status-sel {
    font-size: 11px; padding: 3px 8px; border-radius: 20px; font-weight: 700;
    border: none; cursor: pointer; font-family: 'Nunito', sans-serif;
  }
  .del-btn {
    border: none; background: none; color: var(--text2); cursor: pointer;
    font-size: 18px; padding: 0 4px; opacity: 0.4; transition: opacity .15s;
  }
  .del-btn:hover { opacity: 1; color: var(--red); }
  .empty-state { text-align: center; padding: 3rem; color: var(--text2); font-size: 14px; line-height: 2; }

  /* ---- ARÈNES ---- */
  .arena-list { display: flex; flex-direction: column; gap: 8px; }
  .arena-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    transition: border-color .2s;
  }
  .arena-card:hover { border-color: var(--border2); }
  .arena-title-row {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 18px; cursor: pointer; user-select: none; transition: background .15s;
  }
  .arena-title-row:hover { background: var(--surface2); }
  .arena-emoji { font-size: 22px; line-height: 1; flex-shrink: 0; }
  .arena-info { flex: 1; }
  .arena-name { font-size: 14px; font-weight: 800; }
  .arena-champ { font-size: 11px; color: var(--text2); font-weight: 600; margin-top: 1px; }
  .arena-summary { display: flex; gap: 6px; align-items: center; }
  .mini-pill { font-size: 11px; padding: 2px 8px; border-radius: 20px; font-weight: 700; }
  .pill-g { background: var(--green-bg); color: var(--green); }
  .pill-gray { background: var(--surface2); color: var(--text2); }
  .arena-chevron { color: var(--text2); font-size: 11px; transition: transform .2s; flex-shrink: 0; }
  .arena-chevron.open { transform: rotate(180deg); }
  .arena-body {
    border-top: 1px solid var(--border);
    padding: 16px 18px; display: none;
  }
  .arena-body.open { display: block; }
  .fight-section-title {
    font-size: 10px; font-weight: 800; color: var(--text2);
    text-transform: uppercase; letter-spacing: 0.8px;
    margin-bottom: 10px; margin-top: 16px;
  }
  .fight-section-title:first-child { margin-top: 0; }
  .fight-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .fight-label { flex: 1; font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 6px; }
  .fight-btns { display: flex; gap: 4px; }
  .fb {
    padding: 4px 10px; border-radius: 6px; border: 1px solid var(--border2);
    background: var(--surface2); cursor: pointer; font-size: 12px;
    font-weight: 700; font-family: 'Nunito', sans-serif; color: var(--text2);
    transition: all .1s;
  }
  .fb:hover { border-color: var(--text2); color: var(--text); }
  .fb.win { background: var(--green-bg); border-color: var(--green); color: var(--green); }
  .fb.loss { background: var(--red-bg); border-color: var(--red); color: var(--red); }
  .fb.null { background: var(--surface2); color: var(--text3); border-color: var(--border); }
  .fight-result-txt { font-size: 11px; min-width: 70px; color: var(--text2); font-weight: 600; }

  /* ---- RÉCAP ---- */
  .recap-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 12px; margin-bottom: 24px; }
  .stat-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 16px;
  }
  .stat-card-header { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
  .stat-dot { width: 10px; height: 10px; border-radius: 50%; }
  .stat-pname { font-size: 14px; font-weight: 800; }
  .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .stat-item {}
  .stat-label { font-size: 10px; color: var(--text2); font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 2px; }
  .stat-value { font-size: 22px; font-weight: 800; }
  .stat-sub { font-size: 11px; color: var(--text2); font-weight: 600; }
  .progress-bar { height: 4px; border-radius: 2px; background: var(--surface2); margin-top: 12px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 2px; transition: width .4s; }
  .section-title {
    font-size: 11px; font-weight: 800; color: var(--text2);
    text-transform: uppercase; letter-spacing: 0.8px;
    margin-bottom: 10px; margin-top: 24px;
  }
  .recap-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .recap-table th {
    font-size: 10px; font-weight: 700; color: var(--text2);
    text-transform: uppercase; letter-spacing: 0.5px;
    padding: 8px 10px; border-bottom: 1px solid var(--border); text-align: center;
  }
  .recap-table th:first-child { text-align: left; }
  .recap-table td { padding: 8px 10px; border-bottom: 1px solid var(--border); text-align: center; font-size: 12px; font-weight: 600; }
  .recap-table td:first-child { text-align: left; }
  .recap-table tr:last-child td { border-bottom: none; }
  .recap-table tr:hover td { background: rgba(255,255,255,0.02); }
  .hint { font-size: 10px; color: var(--text3); margin-top: 6px; font-weight: 600; }
</style>
</head>
<body>

<header>
  <div>
    <div class="logo">Pokémon <span>ROSA</span></div>
    <div class="header-sub">Nuzlocke Tracker — Aventure entre amis</div>
  </div>
</header>

<div class="tabs-bar">
  <button class="tab active" onclick="showTab('joueurs')">Dresseurs</button>
  <button class="tab" onclick="showTab('captures')">Captures</button>
  <button class="tab" onclick="showTab('arenes')">Arènes</button>
  <button class="tab" onclick="showTab('recap')">Récap</button>
</div>

<div class="content">
  <div id="tab-joueurs" class="section active"></div>
  <div id="tab-captures" class="section"></div>
  <div id="tab-arenes" class="section"></div>
  <div id="tab-recap" class="section"></div>
</div>

<script>
const PC = [
  { bg: 'rgba(91,142,240,0.2)', color: '#5b8ef0', dot: '#5b8ef0' },
  { bg: 'rgba(240,165,0,0.2)',  color: '#f0a500', dot: '#f0a500' },
  { bg: 'rgba(76,175,125,0.2)', color: '#4caf7d', dot: '#4caf7d' },
];

const ARENES = [
  { name: 'Mérouville',     champ: 'Roxanne',      type: 'Roche',   emoji: '🪨', badge: 'Badge Roche' },
  { name: 'Myokara',        champ: 'Bastien',       type: 'Combat',  emoji: '🥊', badge: 'Badge Poing' },
  { name: 'Lavandia',       champ: 'Voltère',       type: 'Électrik',emoji: '⚡', badge: 'Badge Dynamo' },
  { name: 'Vermilava',      champ: 'Adriane',       type: 'Feu',     emoji: '🔥', badge: 'Badge Chaleur' },
  { name: 'Clémenti-Ville', champ: 'Norman',        type: 'Normal',  emoji: '⭕', badge: 'Badge Balancier' },
  { name: 'Cimetronelle',   champ: 'Alizée',        type: 'Vol',     emoji: '🌬️', badge: 'Badge Plume' },
  { name: 'Algatia',        champ: 'Lévy & Tatia',  type: 'Psy',     emoji: '🔮', badge: 'Badge Esprit' },
  { name: 'Atalanopolis',   champ: 'Marc',          type: 'Eau',     emoji: '💧', badge: 'Badge Pluie' },
];

const ZONES = [
  'Route 101','Route 102','Route 103','Route 104','Route 110','Route 111','Route 112',
  'Route 113','Route 114','Route 115','Route 116','Route 117','Route 118','Route 119',
  'Route 120','Route 121','Route 123',
  'Chenal 105','Chenal 106','Chenal 107','Chenal 108','Chenal 109',
  'Chenal 122','Chenal 124','Chenal 125','Chenal 126','Chenal 127',
  'Chenal 128','Chenal 129','Chenal 130','Chenal 131','Chenal 132','Chenal 133','Chenal 134',
  'Bois Clémenti','Grotte Granite','Lavandia Sea','Chemin Ardent','Sentier Sinuroc',
  'Site Météore','Tunnel Mérazon','Désert Central','Grotte Tréfonds','Parc Safari',
  'Mont Mémoria','Grotte Origine','Route Victoire','Atoll de Combat',
  'Caverne Fondmer','Grotte Zénith','Mont Chimnée',
];

function makeArena() {
  return {
    vsChamp: Array(3).fill(null),
    duels: { '0v1': { winner: null }, '0v2': { winner: null }, '1v2': { winner: null } }
  };
}

let state = {
  players: [
    { name: 'Joueur 1', badges: Array(8).fill(false) },
    { name: 'Joueur 2', badges: Array(8).fill(false) },
    { name: 'Joueur 3', badges: Array(8).fill(false) },
  ],
  captures: [],
  arenes: Array(8).fill(null).map(() => makeArena()),
  openArena: -1,
};

function save() { try { localStorage.setItem('pkmn_rosa', JSON.stringify(state)); } catch(e) {} }
function load() {
  try {
    const d = localStorage.getItem('pkmn_rosa');
    if (d) {
      const s = JSON.parse(d);
      state.players = s.players || state.players;
      state.captures = s.captures || [];
      state.arenes = s.arenes || state.arenes;
      state.openArena = s.openArena !== undefined ? s.openArena : -1;
    }
  } catch(e) {}
}

// ===== JOUEURS =====
function renderJoueurs() {
  document.getElementById('tab-joueurs').innerHTML = `<div class="player-grid">${state.players.map((p, i) => {
    const c = PC[i];
    const init = p.name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
    const earned = p.badges.filter(Boolean).length;
    return `<div class="player-card">
      <div class="player-header">
        <div class="player-avatar" style="background:${c.bg};color:${c.color}">${init}</div>
        <input class="player-name-input" value="${esc(p.name)}" onchange="updateName(${i}, this.value)" />
      </div>
      <div class="badges-label">Badges obtenus (${earned}/8)</div>
      <div class="badges-row">${ARENES.map((a, j) =>
        `<button class="badge-btn${p.badges[j] ? ' earned' : ''}" onclick="toggleBadge(${i},${j})" title="${a.badge} — ${a.champ}">${a.emoji}</button>`
      ).join('')}</div>
    </div>`;
  }).join('')}</div>`;
}

function updateName(i, v) { state.players[i].name = v || `Joueur ${i+1}`; save(); renderAll(); }
function toggleBadge(pi, bi) { state.players[pi].badges[bi] = !state.players[pi].badges[bi]; save(); renderAll(); }

// ===== CAPTURES =====
function renderCaptures() {
  const tbody = state.captures.length === 0
    ? `<tr><td colspan="6"><div class="empty-state">Aucune capture pour le moment.<br>Cliquez sur <strong>+ Ajouter</strong> pour commencer !</div></td></tr>`
    : state.captures.map((c, i) => {
        const col = PC[c.player] || PC[0];
        const pOpts = state.players.map((p, j) => `<option value="${j}"${j===c.player?' selected':''}>${esc(p.name)}</option>`).join('');
        const zOpts = ZONES.map(z => `<option value="${z}"${z===c.zone?' selected':''}>${z}</option>`).join('');
        const ss = c.statut === 'mort'
          ? 'background:rgba(232,93,93,0.2);color:#e85d5d'
          : 'background:rgba(76,175,125,0.2);color:#4caf7d';
        return `<tr>
          <td style="display:flex;align-items:center">
            <span class="player-dot" style="background:${col.dot}"></span>
            <select class="inline-select" onchange="updCap(${i},'player',parseInt(this.value))">${pOpts}</select>
          </td>
          <td><input class="inline-input" value="${esc(c.pokemon)}" placeholder="Ex: Salamèche" onchange="updCap(${i},'pokemon',this.value)"/></td>
          <td><select class="inline-select" onchange="updCap(${i},'zone',this.value)">${zOpts}</select></td>
          <td><input class="inline-input" value="${esc(c.surnom)}" placeholder="Surnom..." onchange="updCap(${i},'surnom',this.value)"/></td>
          <td>
            <select class="status-sel" style="${ss}" onchange="updCap(${i},'statut',this.value)">
              <option value="vivant"${c.statut==='vivant'?' selected':''}>Vivant</option>
              <option value="mort"${c.statut==='mort'?' selected':''}>Mort</option>
            </select>
          </td>
          <td><button class="del-btn" onclick="delCap(${i})">×</button></td>
        </tr>`;
      }).join('');

  document.getElementById('tab-captures').innerHTML = `
    <div class="section-header">
      <h3>Journal des captures</h3>
      <button class="add-btn" onclick="addCap()">+ Ajouter</button>
    </div>
    <div class="table-wrap">
      <table class="captures-table">
        <thead><tr><th>Dresseur</th><th>Pokémon</th><th>Zone</th><th>Surnom</th><th>Statut</th><th></th></tr></thead>
        <tbody>${tbody}</tbody>
      </table>
    </div>`;
}

function addCap() { state.captures.push({ player: 0, pokemon: '', zone: ZONES[0], surnom: '', statut: 'vivant' }); save(); renderCaptures(); showTab('captures'); }
function updCap(i, k, v) { state.captures[i][k] = v; save(); renderCaptures(); renderRecap(); }
function delCap(i) { state.captures.splice(i, 1); save(); renderAll(); }

// ===== ARÈNES =====
function arenaSummaryPill(ai) {
  const ar = state.arenes[ai];
  const anySet = ar.vsChamp.some(r => r !== null) || Object.values(ar.duels).some(d => d.winner !== null);
  if (!anySet) return `<span class="mini-pill pill-gray">Non joué</span>`;
  const wins = computeWins(ai);
  const max = Math.max(...wins);
  if (max === 0) return `<span class="mini-pill pill-gray">En cours</span>`;
  const leader = wins.indexOf(max);
  return `<span class="mini-pill pill-g" style="background:${PC[leader].bg};color:${PC[leader].color}">${esc(state.players[leader].name)} — ${max} pts</span>`;
}

function computeWins(ai) {
  const ar = state.arenes[ai];
  const wins = [0, 0, 0];
  ar.vsChamp.forEach((r, pi) => { if (r === 'win') wins[pi]++; });
  [[0,1],[0,2],[1,2]].forEach(([a,b]) => {
    const key = `${a}v${b}`;
    const w = ar.duels[key].winner;
    if (w === a) wins[a]++;
    else if (w === b) wins[b]++;
  });
  return wins;
}

function renderArenes() {
  const html = ARENES.map((a, ai) => {
    const ar = state.arenes[ai];
    const isOpen = state.openArena === ai;

    const vsChampRows = state.players.map((p, pi) => {
      const r = ar.vsChamp[pi];
      const dot = `<span class="player-dot" style="background:${PC[pi].dot}"></span>`;
      const txt = r === 'win' ? `<span style="color:#4caf7d">Victoire</span>` : r === 'loss' ? `<span style="color:#e85d5d">Défaite</span>` : '—';
      return `<div class="fight-row">
        <div class="fight-label">${dot}${esc(p.name)}</div>
        <div class="fight-btns">
          <button class="fb${r==='win'?' win':''}" onclick="setChamp(${ai},${pi},'win')">✓ Victoire</button>
          <button class="fb${r==='loss'?' loss':''}" onclick="setChamp(${ai},${pi},'loss')">✗ Défaite</button>
          <button class="fb${r===null?' null':''}" onclick="setChamp(${ai},${pi},null)">— Réinit</button>
        </div>
        <div class="fight-result-txt">${txt}</div>
      </div>`;
    }).join('');

    const duelRows = [[0,1],[0,2],[1,2]].map(([pa, pb]) => {
      const key = `${pa}v${pb}`;
      const d = ar.duels[key];
      const w = d.winner;
      const na = esc(state.players[pa].name), nb = esc(state.players[pb].name);
      const txt = w === pa ? `<span style="color:#4caf7d">${na}</span>` : w === pb ? `<span style="color:#4caf7d">${nb}</span>` : '—';
      return `<div class="fight-row">
        <div class="fight-label">
          <span class="player-dot" style="background:${PC[pa].dot}"></span>${na}
          <span style="color:#555a72;margin:0 4px">vs</span>
          <span class="player-dot" style="background:${PC[pb].dot}"></span>${nb}
        </div>
        <div class="fight-btns">
          <button class="fb${w===pa?' win':''}" onclick="setDuel(${ai},'${key}',${pa})">${na}</button>
          <button class="fb${w===pb?' win':''}" onclick="setDuel(${ai},'${key}',${pb})">${nb}</button>
          <button class="fb${w===null?' null':''}" onclick="setDuel(${ai},'${key}',null)">— Réinit</button>
        </div>
        <div class="fight-result-txt">${txt} gagne</div>
      </div>`;
    }).join('');

    return `<div class="arena-card">
      <div class="arena-title-row" onclick="toggleArena(${ai})">
        <span class="arena-emoji">${a.emoji}</span>
        <div class="arena-info">
          <div class="arena-name">${a.name} — ${a.champ}</div>
          <div class="arena-champ">Type ${a.type} · ${a.badge}</div>
        </div>
        <div class="arena-summary">${arenaSummaryPill(ai)}</div>
        <span class="arena-chevron${isOpen ? ' open' : ''}">▼</span>
      </div>
      <div class="arena-body${isOpen ? ' open' : ''}">
        <div class="fight-section-title">Vs le champion ${a.champ}</div>
        ${vsChampRows}
        <div class="fight-section-title">Affrontements entre dresseurs</div>
        ${duelRows}
      </div>
    </div>`;
  }).join('');

  document.getElementById('tab-arenes').innerHTML = `<div class="arena-list">${html}</div>`;
}

function toggleArena(ai) { state.openArena = state.openArena === ai ? -1 : ai; save(); renderArenes(); }

function setChamp(ai, pi, val) {
  state.arenes[ai].vsChamp[pi] = val;
  if (val === 'win') state.players[pi].badges[ai] = true;
  else if (val === 'loss') state.players[pi].badges[ai] = false;
  save(); renderAll();
}

function setDuel(ai, key, winner) {
  state.arenes[ai].duels[key].winner = winner;
  save(); renderArenes(); renderRecap();
}

// ===== RÉCAP =====
function renderRecap() {
  const champWins = [0,0,0], duelWins = [0,0,0];
  state.arenes.forEach(ar => {
    ar.vsChamp.forEach((r, pi) => { if (r === 'win') champWins[pi]++; });
    [[0,1],[0,2],[1,2]].forEach(([a,b]) => {
      const w = ar.duels[`${a}v${b}`].winner;
      if (w === a) duelWins[a]++;
      else if (w === b) duelWins[b]++;
    });
  });

  const statCards = state.players.map((p, i) => {
    const c = PC[i];
    const caps = state.captures.filter(x => x.player === i);
    const vivants = caps.filter(x => x.statut === 'vivant').length;
    const badges = p.badges.filter(Boolean).length;
    const total = champWins[i] + duelWins[i];
    return `<div class="stat-card">
      <div class="stat-card-header">
        <div class="stat-dot" style="background:${c.dot}"></div>
        <div class="stat-pname">${esc(p.name)}</div>
      </div>
      <div class="stat-grid">
        <div class="stat-item"><div class="stat-label">Pokémon vivants</div><div class="stat-value">${vivants}</div><div class="stat-sub">${caps.length} capturés</div></div>
        <div class="stat-item"><div class="stat-label">Badges</div><div class="stat-value">${badges}/8</div></div>
        <div class="stat-item"><div class="stat-label">Pts vs champion</div><div class="stat-value">${champWins[i]}</div></div>
        <div class="stat-item"><div class="stat-label">Pts duels</div><div class="stat-value">${duelWins[i]}</div><div class="stat-sub">total ${total}</div></div>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${Math.round(badges/8*100)}%;background:${c.dot}"></div></div>
    </div>`;
  }).join('');

  const pNames = state.players.map(p => esc(p.name));
  const thP = pNames.map(n => `<th>${n}</th>`).join('');

  const arenaRows = ARENES.map((a, ai) => {
    const ar = state.arenes[ai];
    const cells = state.players.map((_, pi) => {
      const champ = ar.vsChamp[pi];
      const myPairs = [[0,1],[0,2],[1,2]].filter(([pa,pb]) => pa===pi||pb===pi);
      const dRes = myPairs.map(([pa,pb]) => {
        const w = ar.duels[`${pa}v${pb}`].winner;
        if (w === pi) return `<span style="color:#4caf7d">+1</span>`;
        if (w !== null) return `<span style="color:#555a72">0</span>`;
        return `<span style="color:#555a72">—</span>`;
      }).join(' ');
      const cTxt = champ==='win'?'<span style="color:#4caf7d">✓</span>':champ==='loss'?'<span style="color:#e85d5d">✗</span>':'<span style="color:#555a72">—</span>';
      return `<td>${cTxt} ${dRes}</td>`;
    }).join('');
    return `<tr><td>${a.emoji} ${a.name}</td>${cells}</tr>`;
  }).join('');

  const duelRows = [[0,1],[0,2],[1,2]].map(([a,b]) => {
    let wa=0, wb=0;
    state.arenes.forEach(ar => {
      const w = ar.duels[`${a}v${b}`].winner;
      if (w===a) wa++; else if (w===b) wb++;
    });
    const na=pNames[a], nb=pNames[b];
    const leader = wa>wb?`<span style="color:#4caf7d">${na}</span>`:wb>wa?`<span style="color:#4caf7d">${nb}</span>`:'Égalité';
    return `<tr>
      <td><span class="player-dot" style="background:${PC[a].dot}"></span>${na} vs <span class="player-dot" style="background:${PC[b].dot}"></span>${nb}</td>
      <td style="font-weight:800">${wa} — ${wb}</td>
      <td>${leader}</td>
    </tr>`;
  }).join('');

  document.getElementById('tab-recap').innerHTML = `
    <div class="recap-grid">${statCards}</div>
    <div class="section-title">Résultats par arène</div>
    <div class="table-wrap"><table class="recap-table">
      <thead><tr><th>Arène</th>${thP}</tr></thead>
      <tbody>${arenaRows}</tbody>
    </table></div>
    <p class="hint">✓ = victoire champion · ✗ = défaite · +1 = duel gagné · 0 = duel perdu</p>
    <div class="section-title" style="margin-top:28px">Classement des duels entre dresseurs</div>
    <div class="table-wrap"><table class="recap-table">
      <thead><tr><th>Matchup</th><th>Score</th><th>En tête</th></tr></thead>
      <tbody>${duelRows}</tbody>
    </table></div>`;
}

// ===== UTILS =====
function showTab(name) {
  const names = ['joueurs','captures','arenes','recap'];
  document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', names[i] === name));
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
}

function esc(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderAll() { renderJoueurs(); renderCaptures(); renderArenes(); renderRecap(); }

load();
renderAll();
</script>
</body>
</html>
